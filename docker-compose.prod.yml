version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: startup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: cradlecare
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - startup-network

  redis:
    image: redis:7-alpine
    container_name: startup-redis
    restart: unless-stopped
    networks:
      - startup-network

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: startup-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    networks:
      - startup-network

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: startup-web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - startup-network

networks:
  startup-network:
    name: startup-network
    driver: bridge

volumes:
  postgres-data: